name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install test dependencies
        run: install.packages(c("testthat", "withr"))
        shell: Rscript {0}

      # Toolchain-free: sources the standalone script and exercises the
      # backend-agnostic dispatch / options / validation logic. No rstan,
      # cmdstanr, or Stan toolchain -- the fit / draws / generated-quantities
      # paths need a Stan install and are covered by the host packages (and,
      # in future, a hello-world model here). A failed expectation exits non-zero.
      - name: Run toolchain-free tests
        run: Rscript tests/test-backends.R
