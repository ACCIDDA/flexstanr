name: R-CMD-check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel'}
          - {os: ubuntu-latest,  r: 'devel'}
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}

    continue-on-error: ${{ matrix.config.r == 'devel' }}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      # cmdstanr (a non-CRAN Suggests) is fetched from GitHub via DESCRIPTION's
      # Remotes field, which pak reads. Do NOT add the stan-dev r-universe to the
      # repo pool: pak would then pull its DEV StanHeaders/rstan, which fail to
      # compile against CRAN's RcppEigen. cmdstanr is pure R (no Stan headers of
      # its own), so Remotes pins only cmdstanr and the Stan stack stays on CRAN.
      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::roxygen2
          needs: check

      # man/ is untracked (generated docs; NAMESPACE stays tracked for
      # install_github). Regenerate .Rd before the check builds the package.
      - name: Generate documentation
        run: roxygen2::roxygenise()
        shell: Rscript {0}

      - name: Check package
        uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--no-manual", "--as-cran")'
          # Fail on WARNINGs too (not just errors) - this is a CRAN-bound
          # package, and a stray WARNING (e.g. undocumented args) must break CI.
          # The one expected NOTE (new submission + cmdstanr) still passes.
          error-on: '"warning"'

  check-result:
    if: always()
    needs: [R-CMD-check]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required checks passed
        run: |
          if [ "${{ needs.R-CMD-check.result }}" = "failure" ]; then
            echo "One or more required checks failed"
            exit 1
          fi
