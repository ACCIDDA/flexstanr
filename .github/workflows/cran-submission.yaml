name: CRAN submission

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Type "CONFIRM" to submit flexstanr to CRAN'
        required: true
        default: ''

permissions:
  contents: read
  issues: write

jobs:
  news-version-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Warn if NEWS.md is missing the version heading
        run: |
          VERSION=$(grep -E '^Version:' DESCRIPTION | sed -E 's/Version:[[:space:]]*//')
          if grep -qE "^# flexstanr[[:space:]]+$VERSION([[:space:]]|$)" NEWS.md; then
            echo "NEWS.md heading found for version $VERSION."
          else
            echo "::warning::NEWS.md has no '# flexstanr $VERSION' heading."
          fi

  submit:
    needs: news-version-sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      # cmdstanr (a non-CRAN Suggests) installs from GitHub via the Remotes
      # field, which pak reads; Remotes is stripped below before the submission
      # tarball is built (CRAN does not accept it).
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::roxygen2
          needs: check

      # man/ is git-ignored and regenerated by roxygen2; do it before the build
      # so the submission tarball ships current .Rd.
      - name: Generate documentation
        run: roxygen2::roxygenise()
        shell: Rscript {0}

      - name: Strip dev-only Remotes for submission
        run: |
          grep -vE '^Remotes:|^[[:space:]]+stan-dev/cmdstanr' DESCRIPTION > DESCRIPTION.tmp
          mv DESCRIPTION.tmp DESCRIPTION
          echo "Remotes present: $(grep -c '^Remotes:' DESCRIPTION)"

      - uses: coatless-actions/cran-submission@v1
        with:
          error-on: 'warning'
          confirmation: ${{ github.event.inputs.confirmation }}
