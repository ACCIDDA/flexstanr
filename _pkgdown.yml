url: https://accidda.github.io/flexstanr/
template:
  light-switch: true
  bootstrap: 5

authors:
  sidebar:
    roles: [aut, cre, ctb]
  Carl Pearson:
    href: https://github.com/pearsonca
  Weston Voglesonger:
    href: https://github.com/WestonVoglesonger

reference:
- title: Setup
  desc: Wire flexstanr into your own package.
  contents:
  - use_flexstanr
- title: Fitting
  desc: Build sampler options and fit a model through the chosen backend.
  contents:
  - stan_options
  - fit_model
- title: Threading
  desc: >
    Turn on scheduler-aware threading with stan_options(threading = TRUE); a
    host's fit function checks whether threads were requested so it can warn on a
    model that cannot use them.
  contents:
  - check_threaded
- title: Reading a fit
  desc: Backend-agnostic accessors for a fitted model object.
  contents:
  - backend_draws_array
  - backend_extract
  - backend_generate_quantities
  - backend_has_draws

footer:
  structure:
    left: developed_by
    right: [built_with, accidda]
  components:
